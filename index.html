<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Portafolio Neón Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-cyan: #00fbff;
            --neon-purple: #d400ff;
            --bg-dark: #050508;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            margin-top: 40px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
            /* Neón intenso en el título */
            text-shadow: 
                0 0 5px #fff,
                0 0 10px var(--neon-cyan),
                0 0 20px var(--neon-cyan),
                0 0 40px var(--neon-cyan);
        }

        .container {
            display: flex;
            gap: 25px;
            margin-top: 50px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--neon-cyan);
            border-radius: 15px;
            padding: 25px;
            width: 260px;
            text-align: center;
            transition: all 0.4s ease;
            /* Sombra de neón externa e interna */
            box-shadow: 
                0 0 10px var(--neon-cyan),
                inset 0 0 10px var(--neon-cyan);
        }

        /* Efecto cuando pasas el mouse (Hover) */
        .card:hover {
            transform: translateY(-15px);
            border-color: var(--neon-purple);
            box-shadow: 
                0 0 20px var(--neon-purple),
                0 0 40px var(--neon-purple),
                inset 0 0 15px var(--neon-purple);
        }

        .card h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #fff;
        }

        .mision-vision {
            margin-top: 60px;
            width: 90%;
            max-width: 800px;
            padding: 40px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--neon-purple);
            border-radius: 20px;
            box-shadow: 0 0 20px var(--neon-purple);
            text-align: center;
        }

        .mision-vision h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-purple);
            text-shadow: 0 0 10px var(--neon-purple);
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--neon-cyan);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        textarea:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 10px var(--neon-purple);
        }

        button {
            margin-top: 25px;
            padding: 12px 40px;
            background: transparent;
            color: var(--neon-cyan);
            border: 2px solid var(--neon-cyan);
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        button:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 40px var(--neon-cyan);
        }
    </style>
</head>
<body>

    <h1>Mi Primer Repositorio</h1>

    <div class="container">
        <div class="card">
            <h2>Proyecto 1</h2>
            <p>Análisis de Datos e Informática</p>
        </div>
        <div class="card">
            <h2>Proyecto 2</h2>
            <p>Trading & Algoritmos</p>
        </div>
        <div class="card">
            <h2>Proyecto 3</h2>
            <p>Desarrollo Web Pro</p>
        </div>
    </div>

    <div class="mision-vision">
        <h2>Misión - Visión</h2>
        <p>Estudiante de Ingeniería en Estadística e Informática enfocado en tecnología y mercados financieros.</p>
        <textarea placeholder="Escribe tus metas aquí..."></textarea>
        <br>
        <button onclick="alert('¡Meta guardada con éxito!')">Guardar Meta</button>
    </div>

</body>
</html>
