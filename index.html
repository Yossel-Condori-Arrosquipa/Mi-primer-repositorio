<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MI PRIMER REPOSITORIO</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        color: white;
        text-align: center;
    }

    h1 {
        margin: 20px;
        font-size: 40px;
        text-shadow: 0 0 10px #00f, 0 0 20px #0ff, 0 0 30px #a020f0;
    }

    .container {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
        padding: 20px;
    }

    .card {
        width: 250px;
        padding: 20px;
        border-radius: 15px;
        background: linear-gradient(145deg, #00f, #0ff, #a020f0);
        box-shadow: 0 0 15px #00f, 0 0 25px #0ff, 0 0 35px #a020f0;
        transition: transform 0.3s;
    }

    .card:hover {
        transform: scale(1.05);
    }

    .card h2 {
        text-shadow: 0 0 10px #fff, 0 0 20px #0ff;
    }

    .misión {
        margin: 30px auto;
        width: 80%;
        padding: 20px;
        border-radius: 15px;
        background: linear-gradient(145deg, #a020f0, #0ff, #00f);
        box-shadow: 0 0 15px #a020f0, 0 0 25px #0ff, 0 0 35px #00f;
    }

    textarea {
        width: 100%;
        height: 100px;
        border-radius: 10px;
        border: none;
        padding: 10px;
        font-size: 14px;
        outline: none;
    }

    button {
        margin-top: 10px;
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        background: #0ff;
        color: black;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 0 10px #0ff;
    }

</style>
</head>

<body>

<h1>MI PRIMER REPOSITORIO</h1>

<div class="container" id="proyectos"></div>

<div class="misión">
    <h2>Misión - Visión</h2>
    <textarea id="texto"></textarea>
    <br>
    <button onclick="guardarTexto()">Guardar</button>
</div>

<script>
    // 🔹 ARREGLO DE PROYECTOS
    const proyectos = [
        { nombre: "Proyecto 1", descripcion: "Descripción del proyecto 1" },
        { nombre: "Proyecto 2", descripcion: "Descripción del proyecto 2" },
        { nombre: "Proyecto 3", descripcion: "Descripción del proyecto 3" }
    ];

    const contenedor = document.getElementById("proyectos");

    proyectos.forEach(p => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<h2>${p.nombre}</h2><p>${p.descripcion}</p>`;
        contenedor.appendChild(div);
    });

    // 🔹 GUARDAR MISIÓN-VISIÓN
    function guardarTexto() {
        const texto = document.getElementById("texto").value;
        localStorage.setItem("misionVision", texto);
        alert("Guardado correctamente");
    }

    // 🔹 CARGAR TEXTO GUARDADO
    window.onload = () => {
        const guardado = localStorage.getItem("misionVision");
        if (guardado) {
            document.getElementById("texto").value = guardado;
        }
    }
</script>

</body>
</html>
